name: Build Debug APK arm64 only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g -Dorg.gradle.jvmargs=-Xmx6g"
  FLUTTER_VERBOSE: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Clean build cache
        run: |
          flutter clean
          rm -rf ~/.gradle/caches/transforms-* || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee build.log
          echo "=== CHECKING APK LOCATION ==="
          find build -name "*.apk" -type f
          echo "=== LAST 50 LINES OF LOG ==="
          tail -50 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log