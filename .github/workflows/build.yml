name: Build Debug APK arm64 only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g -Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.java.installations.paths=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64"
  FLUTTER_VERBOSE: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # Changed back to 17

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Clean build cache
        run: |
          flutter clean
          rm -rf ~/.gradle/caches/transforms-* || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK arm64 only
        run: flutter build apk --debug --target-platform=android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zionsongs-arm64-debug
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          retention-days: 7