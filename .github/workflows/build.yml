name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Build debug APK arm64 only
        run: flutter build apk --debug --split-per-abi --target-platform=android-arm64
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=256m -Dfile.encoding=UTF-8"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymns-arm64-v8a-debug
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk