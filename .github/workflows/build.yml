- name: Build APK
        run: flutter build apk --release --no-daemon --no-tree-shake-icons

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
     GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=256m -Dfile.encoding=UTF-8"
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      # Clean build to make sure your AndroidManifest network fixes are bundled freshly
      - name: Clean Build Cache
        run: flutter clean

      # Builds a single, universal production APK file
      - name: Build APK
        run: flutter build apk --release

      # Uploads the finished APK so you can download it from GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk