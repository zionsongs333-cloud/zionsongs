name: Build Debug APK arm64 only

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g -Dorg.gradle.jvmargs=-Xmx6g"
  FLUTTER_VERBOSE: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Clean build cache
        run: |
          flutter clean
          rm -rf ~/.gradle/caches/transforms-* || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: |
        flutter build apk --debug -v
        echo "=== CHECKING APK LOCATION ==="
        find build/app/outputs -name "*.apk" -type f

        - name: Upload APK  
        uses: actions/upload-artifact@v4
        with:
         name: zionsongs-debug-apk
         path: build/app/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn

      - name: Show Gradle errors
        run: cat build/app/outputs/logs/manifest-merger-debug-report.txt 2>/dev/null || true