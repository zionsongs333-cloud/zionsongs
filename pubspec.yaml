name: zion_songs
description: A Flutter church hymn management application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  provider: ^6.0.0
  go_router: ^17.3.0
  pdf: ^3.10.0
  printing: ^5.11.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  shared_preferences: ^2.2.0
  excel: ^4.0.6
  file_picker: ^10.3.8
  share_plus: ^12.0.2
  permission_handler: ^12.0.3
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_transliterator: ^1.0.1
  flutter_cache_manager: ^3.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true