name: zion_songs
description: A Flutter church hymn management application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.0
  provider: ^6.0.0
  go_router: ^12.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  excel: ^2.1.0
  file_picker: ^6.0.0
  permission_handler: ^11.4.0
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
